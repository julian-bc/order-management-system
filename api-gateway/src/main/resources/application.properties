spring.application.name=api-gateway
server.port=8080

# Product Service
spring.cloud.gateway.server.webmvc.routes[0].id=product-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://product-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/v1/products/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1

# Order Service
spring.cloud.gateway.server.webmvc.routes[1].id=order-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://order-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/v1/orders/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=1

# Inventory Service
spring.cloud.gateway.server.webmvc.routes[2].id=inventory-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://inventory-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/v1/inventory/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=StripPrefix=1

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true